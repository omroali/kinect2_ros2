# Kinect Camera Configuration
# Apply with: ./scripts/apply_camera_config.sh config/camera_config.yaml

# Camera 1 Configuration
camera1:
  enabled: true
  frame: kinect2_1_link
  position:
    x: 3.72
    y: 1.18
    z: 0.706
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

# Camera 2 Configuration
camera2:
  enabled: true
  frame: kinect2_2_link
  position:
    x: 3.72
    y: 1.18
    z: 0.706
  orientation:
    roll: 0.0
    pitch: 0.0
